services:

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runner
    container_name: orders-api
    command: ["npx", "ts-node", "src/dev.ts"]   # plain HTTP server for local dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override MongoDB and Redis URLs to point to Docker service names
      # (these take precedence over values in .env)
      MONGODB_URI: mongodb://mongo:27017/orders-dev
      REDIS_URL: redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount src for live reload (changes reflect without rebuild)
      - ./src:/app/src:ro
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: orders-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orders-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
